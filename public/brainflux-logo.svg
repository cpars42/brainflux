<svg viewBox="0 0 460 96" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="edgeGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="outerNode" cx="35%" cy="28%" r="72%">
      <stop offset="0%" stop-color="#c7d2fe"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </radialGradient>
    <radialGradient id="centerNode" cx="32%" cy="26%" r="75%">
      <stop offset="0%" stop-color="#f0f4ff"/>
      <stop offset="60%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </radialGradient>
  </defs>

  <!-- Icon (80x80, centered vertically in 96px height, offset 8px each side) -->
  <g transform="translate(8,8) scale(0.4)">
    <rect width="200" height="200" rx="44" ry="44" fill="#09090b"/>
    <circle cx="100" cy="100" r="55" fill="#6366f1" opacity="0.06"/>
    <line x1="100" y1="28"  x2="169" y2="78"  stroke="#4338ca" stroke-width="1.2" opacity="0.4"/>
    <line x1="169" y1="78"  x2="142" y2="158" stroke="#4338ca" stroke-width="1.2" opacity="0.4"/>
    <line x1="142" y1="158" x2="58"  y2="158" stroke="#4338ca" stroke-width="1.2" opacity="0.4"/>
    <line x1="58"  y1="158" x2="32"  y2="78"  stroke="#4338ca" stroke-width="1.2" opacity="0.4"/>
    <line x1="32"  y1="78"  x2="100" y2="28"  stroke="#4338ca" stroke-width="1.2" opacity="0.4"/>
    <line x1="100" y1="100" x2="100" y2="28"  stroke="#6366f1" stroke-width="1.8" opacity="0.65" filter="url(#edgeGlow)"/>
    <line x1="100" y1="100" x2="169" y2="78"  stroke="#6366f1" stroke-width="1.8" opacity="0.65" filter="url(#edgeGlow)"/>
    <line x1="100" y1="100" x2="142" y2="158" stroke="#6366f1" stroke-width="1.8" opacity="0.65" filter="url(#edgeGlow)"/>
    <line x1="100" y1="100" x2="58"  y2="158" stroke="#6366f1" stroke-width="1.8" opacity="0.65" filter="url(#edgeGlow)"/>
    <line x1="100" y1="100" x2="32"  y2="78"  stroke="#6366f1" stroke-width="1.8" opacity="0.65" filter="url(#edgeGlow)"/>
    <circle cx="100" cy="28"  r="11"  fill="url(#outerNode)" filter="url(#glow)"/>
    <circle cx="169" cy="78"  r="9.5" fill="url(#outerNode)" filter="url(#glow)"/>
    <circle cx="142" cy="158" r="9.5" fill="url(#outerNode)" filter="url(#glow)"/>
    <circle cx="58"  cy="158" r="9.5" fill="url(#outerNode)" filter="url(#glow)"/>
    <circle cx="32"  cy="78"  r="9.5" fill="url(#outerNode)" filter="url(#glow)"/>
    <circle cx="100" cy="100" r="18"  fill="url(#centerNode)" filter="url(#strongGlow)"/>
    <circle cx="93"  cy="93"  r="5.5" fill="white" opacity="0.28"/>
  </g>

  <!-- Wordmark -->
  <text
    font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="46"
    font-weight="700"
    letter-spacing="-1.5"
    x="100"
    y="64"
  >
    <tspan fill="#e4e4e7">Brain</tspan><tspan fill="#818cf8">Flux</tspan>
  </text>

  <!-- Tagline -->
  <text
    x="102"
    y="83"
    font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="11"
    font-weight="400"
    letter-spacing="3.5"
    fill="#52525b"
  >SPATIAL CANVAS</text>
</svg>
